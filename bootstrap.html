<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Unlock ONENNABE - Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #05070d;
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.38);
      --text-faint: rgba(255,255,255,0.15);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body.fade-out { animation: fade-out-bg 0.8s ease-out forwards; }
    @keyframes fade-out-bg { to { opacity: 0; } }

    /* Atmospheric background — shifts through R/G/B hues */
    .bg-atmo {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      animation: bg-rgb 9s ease-in-out infinite;
    }
    @keyframes bg-rgb {
      0%,100% { background:
        radial-gradient(ellipse 65% 55% at 50% 50%, rgba(180,0,60,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 20% 80%, rgba(100,0,180,0.04) 0%, transparent 60%); }
      33%     { background:
        radial-gradient(ellipse 65% 55% at 50% 50%, rgba(0,160,80,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 80% 20%, rgba(0,100,160,0.04) 0%, transparent 60%); }
      66%     { background:
        radial-gradient(ellipse 65% 55% at 50% 50%, rgba(0,80,200,0.09) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 15% 20%, rgba(0,160,200,0.05) 0%, transparent 60%); }
    }

    /* Subtle scanlines */
    .bg-scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 6px
      );
    }

    /* Dust particles */
    .particles {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 3;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float-p 22s infinite;
      opacity: 0;
    }
    @keyframes float-p {
      0%   { transform: translate(0,100vh) scale(0); opacity: 0; }
      8%   { opacity: 0.5; }
      92%  { opacity: 0.2; }
      100% { transform: translate(60px,-110vh) scale(1); opacity: 0; }
    }

    /* Main container */
    .loader-container {
      text-align: center;
      position: relative;
      z-index: 10;
      max-width: 520px;
      padding: 40px;
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .loader-container.fade-out {
      opacity: 0;
      transform: scale(0.96) translateY(-10px);
    }

    /* ── Logo area ── */
    .logo-area {
      position: relative;
      width: 170px; height: 170px;
      margin: 0 auto 52px;
      animation: logo-in 1.2s cubic-bezier(0.16,1,0.3,1) backwards;
    }
    @keyframes logo-in {
      from { opacity: 0; transform: scale(0.65) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Spinning conic RGB ring */
    .rgb-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(
        #ff0044, #ff6600, #ffee00, #00ff88, #0088ff, #aa00ff, #ff0044
      );
      animation: rgb-spin 4s linear infinite;
      -webkit-mask: radial-gradient(transparent 72%, black 74%);
      mask: radial-gradient(transparent 72%, black 74%);
      opacity: 0.75;
    }
    @keyframes rgb-spin { to { transform: rotate(360deg); } }

    /* Second counter-rotating ring — more subtle */
    .rgb-ring-2 {
      position: absolute;
      inset: -22px;
      border-radius: 50%;
      background: conic-gradient(
        #ff0044, #aa00ff, #0088ff, #00ff88, #ffee00, #ff6600, #ff0044
      );
      animation: rgb-spin-rev 7s linear infinite;
      -webkit-mask: radial-gradient(transparent 80%, black 82%);
      mask: radial-gradient(transparent 80%, black 82%);
      opacity: 0.28;
    }
    @keyframes rgb-spin-rev { to { transform: rotate(-360deg); } }

    /* Pulse rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      animation: ring-p 4s ease-in-out infinite;
    }
    .ring-1 { inset: -36px; border: 1px solid rgba(255,255,255,0.06); animation-delay: 0s; }
    .ring-2 { inset: -48px; border: 1px solid rgba(255,255,255,0.03); animation-delay: 1s; }
    @keyframes ring-p {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%     { opacity: 0.8; transform: scale(1.03); }
    }

    /* Orbiting RGB color orbs */
    .orbit-wrap {
      position: absolute; inset: 0;
      animation: orbit-spin 8s linear infinite;
    }
    @keyframes orbit-spin { to { transform: rotate(360deg); } }

    .orb {
      position: absolute;
      top: 50%; left: 50%;
      width: 14px; height: 14px;
      margin: -7px 0 0 -7px;
      border-radius: 50%;
      animation: orb-pulse 1.8s ease-in-out infinite;
    }
    .orb:nth-child(1) {
      background: #ff2244;
      box-shadow: 0 0 14px 5px rgba(255,34,68,0.8), 0 0 28px 8px rgba(255,34,68,0.3);
      animation-name: orb-orbit-0, orb-pulse-r;
    }
    .orb:nth-child(2) {
      background: #00ee66;
      box-shadow: 0 0 14px 5px rgba(0,238,102,0.8), 0 0 28px 8px rgba(0,238,102,0.3);
      animation-name: orb-orbit-1, orb-pulse-g;
    }
    .orb:nth-child(3) {
      background: #1a88ff;
      box-shadow: 0 0 14px 5px rgba(26,136,255,0.8), 0 0 28px 8px rgba(26,136,255,0.3);
      animation-name: orb-orbit-2, orb-pulse-b;
    }
    .orb:nth-child(4) {
      background: #cc44ff;
      box-shadow: 0 0 14px 5px rgba(204,68,255,0.8), 0 0 28px 8px rgba(204,68,255,0.3);
      animation-name: orb-orbit-3, orb-pulse-p;
    }

    .orb { animation-duration: 8s, 1.8s; animation-timing-function: linear, ease-in-out; animation-iteration-count: infinite, infinite; }

    @keyframes orb-orbit-0 {
      from { transform: rotate(0deg)   translateY(-82px) rotate(0deg);   }
      to   { transform: rotate(360deg) translateY(-82px) rotate(-360deg); }
    }
    @keyframes orb-orbit-1 {
      from { transform: rotate(90deg)  translateY(-82px) rotate(-90deg);  }
      to   { transform: rotate(450deg) translateY(-82px) rotate(-450deg); }
    }
    @keyframes orb-orbit-2 {
      from { transform: rotate(180deg) translateY(-82px) rotate(-180deg); }
      to   { transform: rotate(540deg) translateY(-82px) rotate(-540deg); }
    }
    @keyframes orb-orbit-3 {
      from { transform: rotate(270deg) translateY(-82px) rotate(-270deg); }
      to   { transform: rotate(630deg) translateY(-82px) rotate(-630deg); }
    }
    @keyframes orb-pulse-r {
      0%,100% { box-shadow: 0 0 14px 5px rgba(255,34,68,0.8), 0 0 28px 8px rgba(255,34,68,0.3); transform-origin: center; }
      50%     { box-shadow: 0 0 22px 9px rgba(255,34,68,1),   0 0 44px 14px rgba(255,34,68,0.5); }
    }
    @keyframes orb-pulse-g {
      0%,100% { box-shadow: 0 0 14px 5px rgba(0,238,102,0.8), 0 0 28px 8px rgba(0,238,102,0.3); }
      50%     { box-shadow: 0 0 22px 9px rgba(0,238,102,1),   0 0 44px 14px rgba(0,238,102,0.5); }
    }
    @keyframes orb-pulse-b {
      0%,100% { box-shadow: 0 0 14px 5px rgba(26,136,255,0.8), 0 0 28px 8px rgba(26,136,255,0.3); }
      50%     { box-shadow: 0 0 22px 9px rgba(26,136,255,1),   0 0 44px 14px rgba(26,136,255,0.5); }
    }
    @keyframes orb-pulse-p {
      0%,100% { box-shadow: 0 0 14px 5px rgba(204,68,255,0.8), 0 0 28px 8px rgba(204,68,255,0.3); }
      50%     { box-shadow: 0 0 22px 9px rgba(204,68,255,1),   0 0 44px 14px rgba(204,68,255,0.5); }
    }

    /* Center circle — RGB color-cycling glow */
    .center-logo {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #1a1a2e 0%, #0d0d1a 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        inset 0 1px 0 rgba(255,255,255,0.1);
      animation: center-rgb 9s ease-in-out infinite;
    }
    .center-logo span {
      font-size: 46px;
      font-weight: 100;
      color: rgba(255,255,255,0.92);
      letter-spacing: -3px;
      position: relative; z-index: 1;
    }
    @keyframes center-rgb {
      0%,100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 50px rgba(255,20,60,0.5),  0 0 100px rgba(255,20,60,0.2),  inset 0 1px 0 rgba(255,255,255,0.1); }
      33%     { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 50px rgba(0,220,100,0.5),  0 0 100px rgba(0,220,100,0.2),  inset 0 1px 0 rgba(255,255,255,0.1); }
      66%     { box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 0 50px rgba(20,120,255,0.55), 0 0 100px rgba(20,120,255,0.22), inset 0 1px 0 rgba(255,255,255,0.1); }
    }

    /* Typography */
    h1 {
      font-size: 22px;
      font-weight: 200;
      color: var(--text);
      letter-spacing: 7px;
      text-transform: uppercase;
      margin-bottom: 6px;
      animation: fade-up 0.9s ease-out 0.4s backwards;
    }
    .subtitle {
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 8px;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 40px;
      animation: fade-up 0.9s ease-out 0.55s backwards;
    }
    .status {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 30px;
      min-height: 18px;
      font-weight: 300;
      letter-spacing: 0.3px;
      animation: fade-up 0.9s ease-out 0.7s backwards;
      transition: opacity 0.3s ease;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Spinner */
    .spinner-container {
      width: 24px; height: 24px;
      margin: 0 auto;
      position: relative;
      animation: fade-up 0.9s ease-out 0.9s backwards;
    }
    .spinner { width: 100%; height: 100%; position: relative; }
    .spinner-ring {
      position: absolute; inset: 0;
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 50%;
    }
    .spinner-ring-active {
      position: absolute; inset: 0;
      border: 1.5px solid transparent;
      border-top-color: rgba(255,255,255,0.65);
      border-right-color: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress — PS5 bottom bar */
    .progress-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding-bottom: 36px; z-index: 20;
      animation: fade-up 0.9s ease-out 1.1s backwards;
    }
    .progress-container {
      width: 260px; height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
      margin: 0 auto 10px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.45), rgba(255,255,255,0.95));
      width: 0%;
      border-radius: 1px;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 10px rgba(255,255,255,0.35);
      position: relative; overflow: hidden;
    }
    .progress-bar::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: shimmer 2.2s infinite;
    }
    @keyframes shimmer { to { left: 100%; } }
    .progress-text {
      font-size: 9px;
      color: rgba(255,255,255,0.18);
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
    }

    /* Error */
    .error-message {
      background: rgba(160,20,20,0.07);
      border: 1px solid rgba(255,60,60,0.12);
      border-radius: 14px;
      padding: 22px 26px;
      margin-top: 28px;
      color: rgba(255,110,110,0.85);
      display: none;
      backdrop-filter: blur(24px);
    }
    .error-message.show { display: block; animation: fade-up 0.4s ease-out; }
    .error-message strong {
      display: block; font-size: 13px; font-weight: 500;
      letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .error-message p { font-size: 11px; opacity: 0.65; font-weight: 300; }
    .retry-btn {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 9px 30px; border-radius: 5px;
      font-size: 10px; font-weight: 400;
      letter-spacing: 2.5px; text-transform: uppercase;
      cursor: pointer; margin-top: 16px; transition: all 0.2s;
    }
    .retry-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.22); }

    .version {
      position: fixed; bottom: 28px; right: 28px;
      font-size: 9px; color: rgba(255,255,255,0.12);
      font-weight: 300; letter-spacing: 1.5px;
      text-transform: uppercase; z-index: 30;
    }
  </style>
</head>
<body>

  <div class="bg-atmo"></div>
  <div class="bg-scan"></div>
  <div class="particles" id="particles"></div>

  <div class="loader-container" id="loader-container">

    <div class="logo-area">
      <div class="rgb-ring-2"></div>
      <div class="rgb-ring"></div>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="orbit-wrap">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
      </div>
      <div class="center-logo"><span>SU</span></div>
    </div>

    <h1>Steam Unlock</h1>
    <div class="subtitle">Onennabe</div>
    <div class="status" id="status">Initializing system...</div>

    <div class="spinner-container" id="spinner">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring-active"></div>
      </div>
    </div>

    <div class="error-message" id="error-message">
      <strong>Loading Failed</strong>
      <p id="error-details">Unable to download app files from server.</p>
      <button class="retry-btn" onclick="retryBootstrap()">Retry</button>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-text" id="progress-text">0%</div>
  </div>

  <div class="version">Bootstrap v1.3.1</div>

  <script>
    const BOOT_CONFIG = {
      minDisplayTime: 4000,
      progressSteps: [
        { percent: 20, delay: 300, message: 'Initializing system...' },
        { percent: 40, delay: 400, message: 'Connecting to system...' },
        { percent: 60, delay: 400, message: 'Loading application data...' },
        { percent: 85, delay: 500, message: 'Preparing interface...' },
        { percent: 100, delay: 600, message: 'System ready' }
      ]
    };

    function createParticles() {
      const container = document.getElementById('particles');
      const colors = [
        'rgba(255,34,68,VAL)',
        'rgba(0,238,102,VAL)',
        'rgba(26,136,255,VAL)',
        'rgba(204,68,255,VAL)',
        'rgba(255,180,0,VAL)',
      ];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1.2;
        const col = colors[i % colors.length].replace('VAL', '0.9');
        p.style.cssText =
          'width:' + size + 'px;height:' + size + 'px;' +
          'left:' + (Math.random() * 100) + '%;' +
          'background:radial-gradient(circle,' + col + ',transparent);' +
          'animation-delay:' + (Math.random() * 22) + 's;' +
          'animation-duration:' + (Math.random() * 12 + 18) + 's;';
        container.appendChild(p);
      }
    }
    createParticles();

    class AppBootstrap {
      constructor() {
        this.progress = 0;
        this.statusEl = document.getElementById('status');
        this.progressBar = document.getElementById('progress-bar');
        this.progressText = document.getElementById('progress-text');
        this.errorEl = document.getElementById('error-message');
        this.spinner = document.getElementById('spinner');
        this.startTime = Date.now();
        this.downloadedContent = null;
      }

      updateStatus(message) {
        this.statusEl.textContent = message;
        console.log('[Bootstrap] ' + message);
      }

      updateProgress(percent) {
        this.progress = Math.min(100, Math.max(0, percent));
        this.progressBar.style.width = this.progress + '%';
        this.progressText.textContent = Math.round(this.progress) + '%';
      }

      async animateProgress(targetPercent, duration) {
        return new Promise(resolve => {
          const startPercent = this.progress;
          const diff = targetPercent - startPercent;
          const startTime = Date.now();
          const animate = () => {
            const t = Math.min((Date.now() - startTime) / duration, 1);
            this.updateProgress(startPercent + diff * (1 - Math.pow(1 - t, 3)));
            if (t < 1) requestAnimationFrame(animate); else resolve();
          };
          animate();
        });
      }

      showError(message, details) {
        this.spinner.style.display = 'none';
        this.errorEl.classList.add('show');
        document.getElementById('error-details').textContent = details || message;
        this.updateStatus('System error');
      }

      hideError() {
        this.errorEl.classList.remove('show');
        this.spinner.style.display = 'block';
      }

      async fetchFromBackend(endpoint) {
        const response = await fetch(endpoint);
        if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + response.statusText);
        return await response.text();
      }

      async playBootSequence() {
        for (const step of BOOT_CONFIG.progressSteps) {
          this.updateStatus(step.message);
          await this.animateProgress(step.percent, step.delay);
          await this.sleep(100);
        }
      }

      async ensureMinimumDisplayTime() {
        const remaining = BOOT_CONFIG.minDisplayTime - (Date.now() - this.startTime);
        if (remaining > 0) await this.sleep(remaining);
      }

      sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

      async fadeOutAndTransition() {
        document.getElementById('loader-container').classList.add('fade-out');
        document.body.classList.add('fade-out');
        await this.sleep(800);
        if (this.downloadedContent) {
          document.open();
          document.write(this.downloadedContent);
          document.close();
        }
      }

      async downloadAndInject() {
        try {
          this.hideError();
          const bootPromise = this.playBootSequence();
          const downloadPromise = this.fetchFromBackend('/api/bootstrap/index.html');
          this.downloadedContent = await downloadPromise;
          console.log('[Bootstrap] Download complete');
          await bootPromise;
          await this.ensureMinimumDisplayTime();
          await this.fadeOutAndTransition();
          console.log('[Bootstrap] Application loaded successfully');
        } catch (error) {
          console.error('[Bootstrap] Failed:', error);
          this.showError('System initialization failed', error.message);
          throw error;
        }
      }

      async start() {
        console.log('[Bootstrap] Starting boot sequence...');
        this.updateStatus('Booting system...');
        try { await this.downloadAndInject(); }
        catch (error) { console.error('[Bootstrap] Boot failed:', error); }
      }
    }

    function retryBootstrap() { location.reload(); }

    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => new AppBootstrap().start(), 1000);
    });
    window.addEventListener('error', e => console.error('[Bootstrap] Global error:', e.error));
    window.addEventListener('unhandledrejection', e => console.error('[Bootstrap] Unhandled rejection:', e.reason));
  </script>
</body>
</html>
