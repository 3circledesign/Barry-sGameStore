<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Unlock ONENNABE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1: #0b1220;
      --bg-2: #111a2b;
      --bg-3: #172338;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.96);
      --text-soft: rgba(255,255,255,0.68);
      --accent: #7dd3fc;
      --accent-2: #60a5fa;
      --glow: rgba(125, 211, 252, 0.22);
      --shadow: 0 25px 80px rgba(0,0,0,0.38);
      --radius: 32px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0b1220;
    }

    body {
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(96,165,250,0.16), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(148,163,184,0.12), transparent 24%),
        radial-gradient(circle at 50% 88%, rgba(125,211,252,0.08), transparent 22%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 46%, var(--bg-3) 100%);
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 88px 88px;
      mask-image: radial-gradient(circle at center, black 20%, transparent 82%);
      opacity: 0.25;
    }

    body::after {
      background: radial-gradient(circle at center, transparent 0, rgba(0,0,0,0.16) 65%, rgba(0,0,0,0.46) 100%);
    }

    .ambient {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.7;
      animation: drift 14s ease-in-out infinite;
    }

    .orb.one {
      width: 320px;
      height: 320px;
      left: -80px;
      top: 12%;
      background: radial-gradient(circle, rgba(96,165,250,0.28), transparent 68%);
    }

    .orb.two {
      width: 420px;
      height: 420px;
      right: -120px;
      top: -50px;
      background: radial-gradient(circle, rgba(125,211,252,0.18), transparent 68%);
      animation-delay: -5s;
    }

    .orb.three {
      width: 340px;
      height: 340px;
      left: 50%;
      bottom: -120px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
      animation-delay: -8s;
    }

    .shell {
      width: min(92vw, 540px);
      padding: 28px;
      position: relative;
      z-index: 2;
    }

    .card {
      position: relative;
      padding: 42px 34px 30px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(28px) saturate(140%);
      -webkit-backdrop-filter: blur(28px) saturate(140%);
      overflow: hidden;
      animation: cardIn 1s cubic-bezier(.22,1,.36,1) backwards;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.30), rgba(255,255,255,0.08), rgba(125,211,252,0.26));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), transparent 26%);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 24px;
      animation: rise 0.85s ease 0.15s backwards;
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ffffff);
      box-shadow: 0 0 12px rgba(125,211,252,0.75);
      animation: pulse 2.6s ease-in-out infinite;
    }

    .logo-stage {
      position: relative;
      width: 170px;
      height: 170px;
      margin: 0 auto 26px;
      animation: rise 1s ease 0.24s backwards;
    }

    .halo,
    .ring,
    .ring-outer,
    .ring-trace,
    .logo-core,
    .logo-shine {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .halo {
      inset: -26px;
      background: radial-gradient(circle, rgba(125,211,252,0.18), transparent 62%);
      filter: blur(18px);
      animation: breathe 4.8s ease-in-out infinite;
    }

    .ring {
      inset: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 26px rgba(125,211,252,0.10);
    }

    .ring-outer {
      inset: -8px;
      border: 1px solid rgba(255,255,255,0.10);
      animation: spin 14s linear infinite;
    }

    .ring-trace {
      inset: -12px;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(125,211,252,0.92) 80deg, rgba(255,255,255,0.0) 155deg, transparent 360deg);
      -webkit-mask: radial-gradient(transparent 69%, #000 72%, transparent 75%);
      mask: radial-gradient(transparent 69%, #000 72%, transparent 75%);
      animation: spin 5.4s linear infinite;
      filter: drop-shadow(0 0 18px rgba(125,211,252,0.42));
    }

    .logo-core {
      inset: 20px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.25), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04)),
        linear-gradient(180deg, rgba(20,30,46,0.96), rgba(10,18,30,0.98));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -18px 42px rgba(0,0,0,0.28),
        0 18px 48px rgba(0,0,0,0.30),
        0 0 60px var(--glow);
    }

    .logo-core::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(125,211,252,0.08) 50%, transparent 100%);
      transform: translateY(-100%);
      animation: scan 3.2s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    .logo-shine {
      inset: 20px;
      background: linear-gradient(125deg, transparent 18%, rgba(255,255,255,0.34) 42%, transparent 58%);
      transform: translateX(-160%) skewX(-16deg);
      animation: shine 3.8s ease-in-out infinite 0.6s;
      mix-blend-mode: screen;
    }

    .logo-text {
      position: relative;
      z-index: 1;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -0.08em;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 0 18px rgba(125,211,252,0.16);
    }

    h1 {
      font-size: clamp(30px, 4vw, 38px);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      margin-bottom: 8px;
      animation: rise 0.9s ease 0.32s backwards;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-soft);
      animation: rise 0.9s ease 0.42s backwards;
    }

    .footer {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.48);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      animation: rise 0.9s ease 0.52s backwards;
    }

    .footer-divider {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes scan {
      0% { transform: translateY(-110%); opacity: 0; }
      18% { opacity: 0.65; }
      50% { opacity: 0.22; }
      100% { transform: translateY(110%); opacity: 0; }
    }

    @keyframes shine {
      0%, 20% { transform: translateX(-160%) skewX(-16deg); opacity: 0; }
      30% { opacity: 0.8; }
      52% { transform: translateX(170%) skewX(-16deg); opacity: 0.16; }
      100% { transform: translateX(170%) skewX(-16deg); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(125,211,252,0.75); }
      50% { transform: scale(1.12); box-shadow: 0 0 18px rgba(125,211,252,1); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.98); opacity: 0.7; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(16px,-18px,0) scale(1.05); }
    }

    @media (max-width: 640px) {
      .shell { padding: 16px; }
      .card { padding: 34px 22px 26px; border-radius: 26px; }
      .logo-stage { width: 144px; height: 144px; }
      .logo-text { font-size: 36px; }
      .subtitle { letter-spacing: 0.2em; }
      .footer { flex-direction: column; gap: 8px; }
      .footer-divider { display: none; }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <div class="shell">
    <div class="card">
      <div class="badge">
        <span class="badge-dot"></span>
        Windows 11 inspired
      </div>

      <div class="logo-stage" aria-hidden="true">
        <div class="halo"></div>
        <div class="ring-trace"></div>
        <div class="ring-outer"></div>
        <div class="ring"></div>
        <div class="logo-core">
          <span class="logo-text">SU</span>
        </div>
        <div class="logo-shine"></div>
      </div>

      <h1>Steam Unlock</h1>
      <div class="subtitle">Onennabe</div>

      <div class="footer">
        <span>Calm glass startup screen</span>
        <span class="footer-divider"></span>
        <span>Looping logo animation</span>
      </div>
    </div>
  </div>
</body>
</html>
